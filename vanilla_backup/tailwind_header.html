<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tailwind Header Component</title>
    <!-- Tailwind CSS via CDN for quick demonstration -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 flex items-start justify-center pt-8 font-sans antialiased">

    <!-- Recreated Header Container -->
    <div class="bg-white w-full max-w-2xl border-b border-gray-100 px-6 py-4 flex justify-between items-center shadow-sm">
        
        <!-- Left Side (Placeholder) -->
        <div class="text-xl font-bold tracking-tight text-gray-800"></div>
        
        <!-- Top Right Header Section -->
        <div class="flex items-center gap-7 text-[#6B6B6B]">
            
            <!-- 'Write' Action -->
            <a href="#" class="flex items-center gap-[6px] hover:text-black transition-colors cursor-pointer group">
                <!-- Exact matching Write SVG -->
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round" class="mt-[1px] group-hover:stroke-black">
                    <!-- Paper outline -->
                    <path d="M12 4H6a1 1 0 0 0-1 1v14a1 1 0 0 0 1 1h14a1 1 0 0 0 1-1v-6"/>
                    <!-- Pen -->
                    <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
                    <!-- Pen tip/eraser lines -->
                    <path d="M16 5l3 3"/>
                </svg>
                <span class="text-[16px] tracking-wide" style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;">Write</span>
            </a>

            <!-- Notification 'Bell' Icon -->
            <button aria-label="Notifications" class="hover:text-black transition-colors">
                <!-- Exact matching Bell SVG -->
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
                    <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
                </svg>
            </button>

            <!-- Circular Avatar -->
            <button aria-label="User Profile" class="w-[36px] h-[36px] rounded-full bg-[#C23C20] text-white flex items-center justify-center cursor-pointer hover:opacity-90 transition-opacity ml-1">
                <span style="font-size: 19px; font-weight: 500; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;">S</span>
            </button>
            
        </div>
    </div>
    
</body>
</html>
