<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Complete Profile - InsideHire</title>
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="styles.css"> <!-- For base vars and dark mode -->
    <link rel="stylesheet" href="onboarding.css"> <!-- Specific to onboarding -->
</head>
<body class="onboarding-page">
    <div class="theme-toggle-wrapper">
        <button class="theme-toggle" id="themeToggleBtn" aria-label="Toggle Dark Mode">
            <i class="fa-regular fa-moon"></i>
        </button>
    </div>

    <div class="onboarding-container">
        <div class="onboarding-card">
            
            <!-- Left Side: Illustration & Copy -->
            <div class="onboarding-left">
                <div class="onboarding-brand">
                    <i class="fa-solid fa-chart-line logo-icon"></i>
                    <span class="logo-text">InsideHire</span>
                </div>
                
                <h1 class="onboarding-title">Complete Your InsideHire Profile</h1>
                <p class="onboarding-subtitle">Your career journey starts with the stories of those who walked it before you.</p>
                
                <div class="illustration-container">
                    <!-- A stylized abstract SVG illustration representing a student reaching graduation -->
                    <svg viewBox="0 0 400 300" class="onboarding-illustration" xmlns="http://www.w3.org/2000/svg">
                        <!-- Pedestal/Floor -->
                        <ellipse cx="200" cy="250" rx="140" ry="25" fill="var(--hover-bg)" opacity="0.6"/>
                        <!-- Graduation Cap -->
                        <g transform="translate(140, 60)">
                            <path d="M 60 10 L 120 -10 L 180 10 L 120 30 Z" fill="var(--primary-color)" />
                            <path d="M 75 15 L 75 40 C 75 50, 165 50, 165 40 L 165 15" fill="var(--primary-hover)" />
                            <!-- Tassel -->
                            <path d="M 120 10 L 170 25 L 170 50" stroke="#F59E0B" stroke-width="3" fill="none"/>
                            <circle cx="170" cy="55" r="4" fill="#F59E0B"/>
                        </g>
                        <!-- Abstract Student Path -->
                        <path d="M 100 250 L 130 180 C 140 150, 180 150, 190 130 L 220 110" stroke="var(--text-light)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="6,6" fill="none" />
                        <!-- Student Point -->
                        <circle cx="100" cy="250" r="8" fill="var(--text-main)" />
                        <!-- Goal Point -->
                        <circle cx="220" cy="110" r="8" fill="var(--primary-color)" />
                    </svg>
                </div>
            </div>

            <!-- Right Side: Form -->
            <div class="onboarding-right">
                <form class="onboarding-form" action="index.html">
                    <div class="form-group">
                        <label for="fullName">Full Name</label>
                        <div class="input-container">
                            <i class="fa-regular fa-user input-icon"></i>
                            <input type="text" id="fullName" placeholder="e.g., Alex Johnson" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="enrollment">Enrollment Number</label>
                        <div class="input-container">
                            <i class="fa-regular fa-id-badge input-icon"></i>
                            <input type="text" id="enrollment" placeholder="e.g., BT22CS001" required>
                        </div>
                    </div>

                    <div class="form-group form-row">
                        <div class="form-half">
                            <label for="degree">Degree</label>
                            <div class="input-container">
                                <i class="fa-solid fa-graduation-cap input-icon"></i>
                                <select id="degree" required>
                                    <option value="" disabled selected>Select Degree</option>
                                    <option value="btech">B.Tech</option>
                                    <option value="mtech">M.Tech</option>
                                    <option value="bca">BCA</option>
                                    <option value="mca">MCA</option>
                                    <option value="bsc">B.Sc</option>
                                </select>
                                <i class="fa-solid fa-chevron-down select-arrow"></i>
                            </div>
                        </div>
                        <div class="form-half">
                            <label for="branch">Branch</label>
                            <div class="input-container">
                                <i class="fa-solid fa-code-branch input-icon"></i>
                                <select id="branch" required>
                                    <option value="" disabled selected>Select Branch</option>
                                    <option value="cse">Computer Science</option>
                                    <option value="it">Information Tech</option>
                                    <option value="ece">Electronics</option>
                                    <option value="me">Mechanical</option>
                                    <option value="ce">Civil</option>
                                </select>
                                <i class="fa-solid fa-chevron-down select-arrow"></i>
                            </div>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="batch">Passing Out Batch Year</label>
                        <div class="input-container">
                            <i class="fa-regular fa-calendar input-icon"></i>
                            <select id="batch" required>
                                <option value="" disabled selected>Select Year</option>
                                <option value="2024">2024</option>
                                <option value="2025">2025</option>
                                <option value="2026">2026</option>
                                <option value="2027">2027</option>
                                <option value="2028">2028</option>
                            </select>
                            <i class="fa-solid fa-chevron-down select-arrow"></i>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="linkedin">LinkedIn Profile <span style="font-weight:400; color:var(--text-light);">(Optional)</span></label>
                        <div class="input-container">
                            <i class="fa-brands fa-linkedin input-icon" style="color: #0A66C2;"></i>
                            <input type="url" id="linkedin" placeholder="https://linkedin.com/in/yourprofile">
                        </div>
                    </div>

                    <button type="submit" class="btn btn-primary btn-block btn-lg">
                        Get Started <i class="fa-solid fa-rocket" style="margin-left:5px;"></i>
                    </button>
                </form>
            </div>
        </div>
    </div>

    <!-- Dark Mode Script identical to index to ensure consistency -->
    <script>
        const themeToggleBtn = document.getElementById('themeToggleBtn');
        const themeIcon = themeToggleBtn.querySelector('i');
        
        const savedTheme = localStorage.getItem('insideHireTheme');
        const systemPrefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        
        if (savedTheme === 'dark' || (!savedTheme && systemPrefersDark)) {
            document.body.classList.add('dark-theme');
            themeIcon.classList.replace('fa-moon', 'fa-sun');
        }

        themeToggleBtn.addEventListener('click', () => {
            document.body.classList.toggle('dark-theme');
            const isDark = document.body.classList.contains('dark-theme');
            
            if (isDark) {
                themeIcon.classList.replace('fa-moon', 'fa-sun');
                localStorage.setItem('insideHireTheme', 'dark');
            } else {
                themeIcon.classList.replace('fa-sun', 'fa-moon');
                localStorage.setItem('insideHireTheme', 'light');
            }
        });
    </script>
</body>
</html>
